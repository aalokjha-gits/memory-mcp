version: '3.8'

services:
  # Memory MCP Server
  memory-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-local}
      - EMBEDDING_URL=http://embeddings:8080
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      qdrant:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - memory-network

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - memory-network

  # Local Embedding Service
  embeddings:
    build:
      context: ..
      dockerfile: docker/Dockerfile.embeddings
    ports:
      - "8080:8080"
    environment:
      - MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - memory-network

volumes:
  qdrant_data:

networks:
  memory-network:
    driver: bridge
