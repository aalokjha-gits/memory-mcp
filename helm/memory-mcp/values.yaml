# Default values for memory-mcp
replicaCount: 1

image:
  repository: aalokjha-gits/memory-mcp
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Memory MCP configuration
config:
  embedding:
    provider: local
    url: http://embeddings:8080
    apiKey: ""
    model: all-MiniLM-L6-v2
  vectordb:
    provider: qdrant
    url: http://qdrant:6333
    collection: memories
  logLevel: info

# Embedding service
embeddings:
  enabled: true
  image:
    repository: aalokjha-gits/embeddings-local
    tag: latest
  model: all-MiniLM-L6-v2
  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"

# Qdrant configuration
qdrant:
  enabled: true
  image:
    repository: qdrant/qdrant
    tag: v1.13.2
  persistence:
    enabled: true
    size: 5Gi
    storageClass: ""
  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"

# Resources for memory-mcp
resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Service configuration
service:
  type: ClusterIP
  port: 3000

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: memory-mcp.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
